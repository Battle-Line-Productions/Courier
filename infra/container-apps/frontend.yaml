# =============================================================================
# Courier Frontend — Azure Container App Definition
# =============================================================================
# Deploy: az containerapp create -n courier-frontend -g $RG --yaml infra/container-apps/frontend.yaml
# Update: az containerapp update -n courier-frontend -g $RG --yaml infra/container-apps/frontend.yaml
# =============================================================================

name: courier-frontend
properties:
  managedEnvironmentId: /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.App/managedEnvironments/{env}
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true           # Public-facing — fronted by Azure Front Door for TLS/WAF
      targetPort: 3000
      transport: http
    registries:
      - server: couriercr.azurecr.io
        identity: system
  template:
    containers:
      - name: courier-frontend
        image: couriercr.azurecr.io/courier-frontend:{tag}
        resources:
          cpu: 0.25
          memory: 0.5Gi
        env:
          - name: NODE_ENV
            value: production
          - name: PORT
            value: "3000"
          - name: HOSTNAME
            value: "0.0.0.0"
        probes:
          - type: liveness
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          - type: readiness
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
    scale:
      minReplicas: 2
      maxReplicas: 4
      rules:
        - name: http-requests
          http:
            metadata:
              concurrentRequests: "100"
  identity:
    type: SystemAssigned
