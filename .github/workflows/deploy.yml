name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.ACR_REGISTRY }}
  TAG: ${{ github.sha }}

jobs:
  # -------------------------------------------------------------------------
  # Build backend images (API + Worker) — reused across all environments
  # -------------------------------------------------------------------------
  build-backend:
    name: Build Backend Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build & push API image
        run: |
          docker build -f infra/docker/Courier.Api.Dockerfile \
            -t ${{ env.REGISTRY }}/courier-api:${{ env.TAG }} \
            -t ${{ env.REGISTRY }}/courier-api:latest \
            .
          docker push ${{ env.REGISTRY }}/courier-api --all-tags

      - name: Build & push Worker image
        run: |
          docker build -f infra/docker/Courier.Worker.Dockerfile \
            -t ${{ env.REGISTRY }}/courier-worker:${{ env.TAG }} \
            -t ${{ env.REGISTRY }}/courier-worker:latest \
            .
          docker push ${{ env.REGISTRY }}/courier-worker --all-tags

  # -------------------------------------------------------------------------
  # Deploy to Dev (automatic after build)
  # -------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to Dev
    needs: build-backend
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build & push Frontend image (dev)
        run: |
          docker build -f infra/docker/Courier.Frontend.Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.API_URL }} \
            -t ${{ env.REGISTRY }}/courier-frontend:${{ env.TAG }}-dev \
            .
          docker push ${{ env.REGISTRY }}/courier-frontend:${{ env.TAG }}-dev

      - name: Deploy API
        run: |
          az containerapp update \
            --name ${{ vars.API_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/courier-api:${{ env.TAG }}

      - name: Deploy Worker
        run: |
          az containerapp update \
            --name ${{ vars.WORKER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/courier-worker:${{ env.TAG }}

      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name ${{ vars.FRONTEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/courier-frontend:${{ env.TAG }}-dev

  # -------------------------------------------------------------------------
  # Deploy to Staging (requires manual approval via GitHub environment)
  # -------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build & push Frontend image (staging)
        run: |
          docker build -f infra/docker/Courier.Frontend.Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.API_URL }} \
            -t ${{ env.REGISTRY }}/courier-frontend:${{ env.TAG }}-staging \
            .
          docker push ${{ env.REGISTRY }}/courier-frontend:${{ env.TAG }}-staging

      - name: Deploy API
        run: |
          az containerapp update \
            --name ${{ vars.API_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/courier-api:${{ env.TAG }}

      - name: Deploy Worker
        run: |
          az containerapp update \
            --name ${{ vars.WORKER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/courier-worker:${{ env.TAG }}

      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name ${{ vars.FRONTEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/courier-frontend:${{ env.TAG }}-staging

  # -------------------------------------------------------------------------
  # Deploy to Production (requires manual approval via GitHub environment)
  # -------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build & push Frontend image (production)
        run: |
          docker build -f infra/docker/Courier.Frontend.Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.API_URL }} \
            -t ${{ env.REGISTRY }}/courier-frontend:${{ env.TAG }}-prod \
            .
          docker push ${{ env.REGISTRY }}/courier-frontend:${{ env.TAG }}-prod

      - name: Deploy API
        run: |
          az containerapp update \
            --name ${{ vars.API_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/courier-api:${{ env.TAG }}

      - name: Deploy Worker
        run: |
          az containerapp update \
            --name ${{ vars.WORKER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/courier-worker:${{ env.TAG }}

      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name ${{ vars.FRONTEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/courier-frontend:${{ env.TAG }}-prod
