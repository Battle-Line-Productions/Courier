name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API base URL'
        required: true
        default: 'http://localhost:5000'
      frontend_url:
        description: 'Frontend base URL'
        required: true
        default: 'http://localhost:3000'

concurrency:
  group: e2e-tests
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/Courier.Frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Courier.Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test --reporter=list,html
        env:
          CI: true
          API_URL: ${{ inputs.api_url }}
          FRONTEND_URL: ${{ inputs.frontend_url }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: src/Courier.Frontend/playwright-report/
          retention-days: 14

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: src/Courier.Frontend/test-results/
          retention-days: 7
