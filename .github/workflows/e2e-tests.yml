name: E2E Tests

on:
  # Run after successful dev deployment
  workflow_run:
    workflows: ["Build & Deploy"]
    types: [completed]
    branches: [main]

  # Manual trigger with environment URL override
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API base URL'
        required: true
        default: 'https://courier-api-dev.{domain}'
      frontend_url:
        description: 'Frontend base URL'
        required: true
        default: 'https://courier-dev.{domain}'

concurrency:
  group: e2e-tests
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    # Only run on successful deployment (skip if deploy failed)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    defaults:
      run:
        working-directory: src/Courier.Frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Courier.Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test --reporter=list,html
        env:
          CI: true
          API_URL: ${{ inputs.api_url || vars.DEV_API_URL }}
          FRONTEND_URL: ${{ inputs.frontend_url || vars.DEV_FRONTEND_URL }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/Courier.Frontend/playwright-report/
          retention-days: 14

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: src/Courier.Frontend/test-results/
          retention-days: 7
