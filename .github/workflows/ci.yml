name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Build, Test & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for SonarCloud blame data

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore Courier.slnx

      - name: SonarCloud Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"Battle-Line-Productions_Courier" \
            /o:"battle-line-productions" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/coverage.opencover.xml" \
            /d:sonar.exclusions="**/Migrations/**,**/obj/**,**/bin/**" \
            /d:sonar.coverage.exclusions="**/Tests/**,**/Migrations/**,**/Program.cs"

      - name: Build
        run: dotnet build Courier.slnx --no-restore -c Release

      - name: Unit Tests
        run: dotnet test tests/Courier.Tests.Unit --no-build -c Release --logger "trx;LogFileName=unit.trx" --collect:"XPlat Code Coverage;Format=opencover"

      - name: Architecture Tests
        run: dotnet test tests/Courier.Tests.Architecture --no-build -c Release --logger "trx;LogFileName=architecture.trx"

      - name: Job Engine Tests
        run: dotnet test tests/Courier.Tests.JobEngine --no-build -c Release --logger "trx;LogFileName=jobengine.trx" --collect:"XPlat Code Coverage;Format=opencover"

      - name: Integration Tests
        run: dotnet test tests/Courier.Tests.Integration --no-build -c Release --logger "trx;LogFileName=integration.trx" --collect:"XPlat Code Coverage;Format=opencover"

      - name: SonarCloud End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Vulnerability scan
        continue-on-error: true
        run: dotnet list Courier.slnx package --vulnerable --include-transitive

  frontend:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Courier.Frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Courier.Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
