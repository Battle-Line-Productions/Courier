name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Courier.slnx

      - name: Build
        run: dotnet build Courier.slnx --no-restore -c Release

      - name: Unit Tests
        run: dotnet test tests/Courier.Tests.Unit --no-build -c Release --logger "trx;LogFileName=unit.trx"

      - name: Architecture Tests
        run: dotnet test tests/Courier.Tests.Architecture --no-build -c Release --logger "trx;LogFileName=architecture.trx"

      - name: Job Engine Tests
        run: dotnet test tests/Courier.Tests.JobEngine --no-build -c Release --logger "trx;LogFileName=jobengine.trx"

      - name: Integration Tests
        run: dotnet test tests/Courier.Tests.Integration --no-build -c Release --logger "trx;LogFileName=integration.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Vulnerability scan
        continue-on-error: true
        run: dotnet list Courier.slnx package --vulnerable --include-transitive

  frontend:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Courier.Frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Courier.Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
