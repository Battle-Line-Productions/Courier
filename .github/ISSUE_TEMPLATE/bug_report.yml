name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, screenshots, or logs if available.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Courier is affected?
      options:
        - API / Backend
        - Worker / Job Engine
        - Frontend / UI
        - Job Scheduling
        - File Monitoring
        - Connections (SFTP/FTP/FTPS)
        - PGP / SSH Keys
        - Notifications
        - Authentication / SSO
        - Audit Log
        - Database / Migrations
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical - System unusable, data loss
        - High - Major feature broken, no workaround
        - Medium - Feature impaired, workaround exists
        - Low - Minor issue, cosmetic
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime details that may help diagnose the issue.
      placeholder: |
        - Courier version/commit:
        - OS: Windows 11 / Ubuntu 24.04 / Docker
        - .NET version: 10.0.x
        - Node.js version: 20.x
        - Browser (if frontend): Chrome 130
        - Database: PostgreSQL 16.x
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output. This will be automatically formatted as code.
      render: shell
    validations:
      required: false
